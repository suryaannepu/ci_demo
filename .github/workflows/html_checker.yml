name: HTML Check

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install HTML Tidy
      run: sudo apt-get update && sudo apt-get install -y tidy

    - name: Validate HTML files
      run: |
        for file in $(find . -name "*.html"); do
          echo "Checking $file"
          tidy -e "$file"
        done
